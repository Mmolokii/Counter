<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">⌘</div>
      <h1>Counter</h1>
    </div>

    <div class="counter-display" id="count" aria-live="polite">0</div>

    <div class="controls">
      <button id="decrement" class="control-btn" aria-label="Decrement">-</button>
      <button id="reset" class="control-btn reset" aria-label="Reset">Reset</button>
      <button id="increment" class="control-btn" aria-label="Increment">Increment</button>
    </div>

    <div class="footer">
      <p class="hint">
        ↑ ↓ to change • <strong>R</strong> to reset
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
